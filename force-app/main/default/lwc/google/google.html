<template>
    <lightning-card title="Google Drive Files">
        <lightning-button label="Load Files" onclick={loadFiles}></lightning-button>

        <template if:true={files}>
            <ul>
                <template for:each={files} for:item="file">
                    <li key={file.id}>{file.name}</li>
                </template>
            </ul>
        </template>
    </lightning-card>
</template>
